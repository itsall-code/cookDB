<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CookDB 设置</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="options-header">
      <p class="eyebrow">Cook-DB 控制台</p>
      <h1>插件设置</h1>
      <div class="small">环境与 Redis、MySQL 命名连接分开管理；底部保存按钮会一并写入当前环境与正在编辑的连接。</div>
    </div>

    <div class="app-tabs" role="tablist">
      <button type="button" class="active" data-app-tab="redis" role="tab">环境 / Redis</button>
      <button type="button" data-app-tab="mysql" role="tab">MySQL 连接</button>
    </div>

    <!-- ========================= 环境 / Redis ========================= -->
    <div id="tab-app-redis" class="app-tab-panel active">
      <div class="section">
        <h2>环境管理</h2>
        <div class="row">
          <div class="col">
            <label for="envSelect">当前环境</label>
            <select id="envSelect"></select>
          </div>
          <div class="col">
            <label for="newEnvName">新环境名</label>
            <input id="newEnvName" type="text" placeholder="dev / test / prod" />
          </div>
        </div>
        <div class="row">
          <div class="col"><button id="addEnvBtn" type="button">新增环境</button></div>
          <div class="col"><button id="deleteEnvBtn" class="danger" type="button">删除当前环境</button></div>
          <div class="col"><button id="exportBtn" class="secondary" type="button">导出配置</button></div>
          <div class="col"><button id="importBtn" class="secondary" type="button">导入配置</button></div>
        </div>
        <input id="importFile" type="file" accept="application/json" style="display:none;" />
      </div>

      <div class="section">
        <h2>后端接口</h2>
        <div class="row"><div class="col"><label for="apiBase">API Base URL</label><input id="apiBase" type="text" /></div></div>
      </div>

      <div class="section">
        <h2>源 Redis</h2>
        <div class="row">
          <div class="col"><label for="sourceHost">Host</label><input id="sourceHost" type="text" /></div>
          <div class="col"><label for="sourcePort">Port</label><input id="sourcePort" type="number" /></div>
          <div class="col"><label for="sourceDb">DB</label><input id="sourceDb" type="number" /></div>
        </div>
        <div class="row"><div class="col"><label for="sourcePassword">Password</label><input id="sourcePassword" type="text" placeholder="留空表示 null" /></div></div>
      </div>

      <div class="section">
        <h2>目标 Redis</h2>
        <div class="row">
          <div class="col"><label for="targetHost">Host</label><input id="targetHost" type="text" /></div>
          <div class="col"><label for="targetPort">Port</label><input id="targetPort" type="number" /></div>
          <div class="col"><label for="targetDb">DB</label><input id="targetDb" type="number" /></div>
        </div>
        <div class="row"><div class="col"><label for="targetPassword">Password</label><input id="targetPassword" type="text" placeholder="留空表示 null" /></div></div>
      </div>

      <div class="section">
        <h2>本地化配置</h2>
        <div class="row">
          <div class="col"><label for="platform">Platform</label><input id="platform" type="text" /></div>
          <div class="col"><label for="group">Group</label><input id="group" type="text" /></div>
        </div>
        <div class="row">
          <div class="col"><label for="server">Server</label><input id="server" type="text" /></div>
          <div class="col"><label for="preLogin">Pre Login</label><input id="preLogin" type="text" /></div>
        </div>
        <div class="row"><div class="col"><label for="defaultHashName">Default Hash Name</label><input id="defaultHashName" type="text" /></div></div>
      </div>

      <div class="section">
        <h2>默认删除配置</h2>
        <div class="row"><div class="col"><label for="defaultTables">默认 tables（每行一个）</label><textarea id="defaultTables"></textarea></div></div>
        <div class="row"><div class="col"><label for="defaultDeleteKeys">默认 keys（每行一个）</label><textarea id="defaultDeleteKeys"></textarea></div></div>
      </div>
    </div>

    <!-- ========================= MySQL 连接 ========================= -->
    <div id="tab-app-mysql" class="app-tab-panel">
      <div class="section">
        <h2>MySQL 连接库</h2>
        <div class="small">命名连接供 MySQL 工作台使用，可保存 dev / test / staging / local 等多个实例。当前编辑的连接会随保存写入当前环境。</div>
        <div class="row">
          <div class="col">
            <label for="mysqlConnSelect">当前编辑</label>
            <select id="mysqlConnSelect"></select>
          </div>
          <div class="col">
            <label for="mysqlConnName">连接名称</label>
            <input id="mysqlConnName" type="text" placeholder="local" />
          </div>
        </div>
        <div class="row">
          <div class="col"><label for="mysqlHost">Host</label><input id="mysqlHost" type="text" /></div>
          <div class="col"><label for="mysqlPort">Port</label><input id="mysqlPort" type="number" /></div>
          <div class="col"><label for="mysqlDatabase">Database</label><input id="mysqlDatabase" type="text" /></div>
        </div>
        <div class="row">
          <div class="col"><label for="mysqlUsername">Username</label><input id="mysqlUsername" type="text" /></div>
          <div class="col"><label for="mysqlPassword">Password</label><input id="mysqlPassword" type="text" placeholder="留空表示 null" /></div>
        </div>
        <div class="row">
          <div class="col"><button id="addMysqlConnBtn" class="secondary" type="button">新增连接</button></div>
          <div class="col"><button id="deleteMysqlConnBtn" class="danger" type="button">删除连接</button></div>
          <div class="col"><button id="testMysqlConnBtn" class="secondary" type="button">测试连接</button></div>
        </div>
        <div class="mysql-links">
          <a href="mysql.html" target="_blank" rel="noopener noreferrer">打开 MySQL 工作台 ↗</a>
        </div>
      </div>
    </div>

    <div class="options-footer">
      <div class="footer-actions">
        <button id="saveBtn" type="button">保存设置</button>
        <button id="testHealthBtn" class="secondary" type="button">测试后端健康检查</button>
      </div>
      <div id="status" class="status">等待操作</div>
    </div>
  </div>
  <script src="shared.js"></script>
  <script src="options.js"></script>
</body>
</html>
